name: E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  E2E_MOCK_AUTH: 'true'
  E2E_BASE_URL: 'http://localhost:3000'
  E2E_API_URL: 'http://localhost:8000/api/v1'

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estate
          POSTGRES_PASSWORD: estate_test
          POSTGRES_DB: estate_executor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://estate:estate_test@localhost:5432/estate_executor_test
          DATABASE_URL_SYNC: postgresql://estate:estate_test@localhost:5432/estate_executor_test
        run: |
          alembic upgrade head

      - name: Start backend server
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://estate:estate_test@localhost:5432/estate_executor_test
          DATABASE_URL_SYNC: postgresql://estate:estate_test@localhost:5432/estate_executor_test
          REDIS_URL: redis://localhost:6379/0
          AUTH0_DOMAIN: test.auth0.com
          AUTH0_API_AUDIENCE: http://localhost:8000
          AUTH0_CLIENT_ID: test-client-id
          AUTH0_CLIENT_SECRET: test-secret
          APP_SECRET_KEY: e2e-test-secret-key-32chars-long!
          ENCRYPTION_MASTER_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/v1/health || echo "Backend health check warning"

      - name: Build and start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: |
          npm run build
          npm run start &
          sleep 5
          curl -f http://localhost:3000 || echo "Frontend health check warning"

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: 'true'
          E2E_MOCK_AUTH: 'true'
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:8000/api/v1
        run: npx playwright test --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 14
