name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (commit SHA, tag, or branch)'
        required: false
        default: 'main'
      skip_approval:
        description: 'Skip manual approval (emergency only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  ECS_CLUSTER: estate-executor-production
  BACKEND_SERVICE: estate-executor-api-production
  WORKER_SERVICE: estate-executor-worker-production
  BACKEND_TASK_DEF: estate-executor-api-production
  WORKER_TASK_DEF: estate-executor-worker-production
  PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Pre-flight: verify the ref has passed CI
  # ─────────────────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Verify ref exists
        run: |
          echo "Deploying ref: ${{ github.event.inputs.ref }}"
          echo "SHA: $(git rev-parse HEAD)"
          echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Check CI status on ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Checking CI status for $SHA ..."
          # Allow proceeding even if check-runs aren't found (new repos)
          gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            --jq '.check_runs[] | "\(.name): \(.conclusion)"' || true

  # ─────────────────────────────────────────────────────────────────────
  # Manual approval gate
  # ─────────────────────────────────────────────────────────────────────
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ github.event.inputs.skip_approval != 'true' }}
    environment: production

    steps:
      - name: Approval confirmed
        run: echo "Production deployment approved by ${{ github.actor }}"

  # ─────────────────────────────────────────────────────────────────────
  # Build & push Docker images
  # ─────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, approval]
    if: always() && needs.preflight.result == 'success' && (needs.approval.result == 'success' || needs.approval.result == 'skipped')
    permissions:
      id-token: write
      contents: read
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      worker-image: ${{ steps.build-worker.outputs.image }}
      deploy-sha: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        id: build-backend
        working-directory: backend
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/estate-executor-api:${{ steps.tag.outputs.tag }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push worker image
        id: build-worker
        working-directory: backend
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/estate-executor-worker:${{ steps.tag.outputs.tag }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────
  # Database migrations (production)
  # ─────────────────────────────────────────────────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-images

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.PRODUCTION_DATABASE_URL_SYNC }}
        run: alembic upgrade head

  # ─────────────────────────────────────────────────────────────────────
  # Deploy backend + worker to ECS Fargate (production)
  # ─────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images, migrate]
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition (API)
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.BACKEND_TASK_DEF }} \
            --query taskDefinition \
            > api-task-def.json

      - name: Update API task definition image
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-def.json
          container-name: api
          image: ${{ needs.build-images.outputs.backend-image }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Download current task definition (Worker)
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.WORKER_TASK_DEF }} \
            --query taskDefinition \
            > worker-task-def.json

      - name: Update Worker task definition image
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-def.json
          container-name: worker
          image: ${{ needs.build-images.outputs.worker-image }}

      - name: Deploy Worker service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ─────────────────────────────────────────────────────────────────────
  # Trigger Vercel production deploy
  # ─────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-images

    steps:
      - name: Trigger Vercel production deployment
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_PRODUCTION_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -sf -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Vercel production deployment triggered"
          else
            echo "VERCEL_PRODUCTION_DEPLOY_HOOK not set — skipping"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Post-deploy smoke tests
  # ─────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Wait for services to stabilize
        run: sleep 20

      - name: Health check — backend API
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "${{ env.PRODUCTION_API_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Backend health check failed after 12 attempts"
          exit 1

      - name: Health check — frontend
        env:
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "$PRODUCTION_FRONTEND_URL" || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Frontend health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Frontend health check failed after 12 attempts"
          exit 1

  # ─────────────────────────────────────────────────────────────────────
  # Notifications
  # ─────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [smoke-test]
    if: always()

    steps:
      - name: Notify success
        if: needs.smoke-test.result == 'success'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -sf -X POST "$SLACK_WEBHOOK" \
              -H 'Content-type: application/json' \
              -d "{
                \"text\": \"🚀 *Production deploy succeeded*\nRef: \`${{ github.event.inputs.ref }}\`\nTriggered by: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }"
          fi

      - name: Notify failure
        if: needs.smoke-test.result != 'success'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -sf -X POST "$SLACK_WEBHOOK" \
              -H 'Content-type: application/json' \
              -d "{
                \"text\": \"🔴 *Production deploy FAILED*\nRef: \`${{ github.event.inputs.ref }}\`\nTriggered by: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n@channel please investigate immediately\"
              }"
          fi

      - name: Create GitHub deployment status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "Production deployment successful"
          else
            echo "Production deployment failed — check logs"
            exit 1
          fi
