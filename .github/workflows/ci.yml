name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Backend checks: lint, type-check, unit + integration tests
  # ─────────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estate
          POSTGRES_PASSWORD: estate_test
          POSTGRES_DB: estate_executor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://estate:estate_test@localhost:5432/estate_executor_test
      DATABASE_URL_SYNC: postgresql://estate:estate_test@localhost:5432/estate_executor_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      APP_SECRET_KEY: ci-test-secret-key-32chars-long!
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_API_AUDIENCE: http://localhost:8000
      AUTH0_CLIENT_ID: ci-test-client
      AUTH0_CLIENT_SECRET: ci-test-secret
      ENCRYPTION_MASTER_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Lint (ruff format)
        working-directory: backend
        run: ruff format --check .

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Unit & integration tests
        working-directory: backend
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Frontend checks: lint, type-check, unit tests, build
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Type check (tsc)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        working-directory: frontend
        run: npm test

      - name: Build check (next build)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────
  # E2E tests — only on PRs targeting main/master
  # ─────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    if: >-
      github.event_name == 'pull_request' &&
      (github.base_ref == 'main' || github.base_ref == 'master')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estate
          POSTGRES_PASSWORD: estate_test
          POSTGRES_DB: estate_executor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://estate:estate_test@localhost:5432/estate_executor_test
      DATABASE_URL_SYNC: postgresql://estate:estate_test@localhost:5432/estate_executor_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      APP_SECRET_KEY: e2e-test-secret-key-32chars-long!
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_API_AUDIENCE: http://localhost:8000
      AUTH0_CLIENT_ID: test-client-id
      AUTH0_CLIENT_SECRET: test-secret
      ENCRYPTION_MASTER_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      E2E_MOCK_AUTH: 'true'
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:8000/api/v1

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done

      - name: Build & start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: |
          npm run build
          npm run start &
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 > /dev/null && break
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload screenshots & videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 14
