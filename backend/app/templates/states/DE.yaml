# Delaware — State-specific tasks and deadline rules

tasks:
  - key: "de_file_register_of_wills"
    title: "File with Delaware Register of Wills"
    description: "File petition for probate with the Register of Wills in the appropriate county"
    instructions: "Delaware handles probate through the Register of Wills (one of three counties: New Castle, Kent, or Sussex). File the petition in the county where the decedent was domiciled. Delaware's probate process is relatively straightforward for uncontested estates."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "de_small_estate"
    title: "Consider Small Estate (Under $30,000)"
    description: "Determine if estate qualifies for simplified process"
    instructions: "Delaware allows a simplified process for estates with personal property valued at $30,000 or less (excluding real property). A small estate affidavit can be filed 30 days after death without full probate."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "de_publish_notice_creditors"
    title: "Publish Notice to Creditors (Delaware)"
    description: "Publish notice as required by the Register of Wills"
    instructions: "Delaware requires notice to creditors by publication. The Register of Wills will direct the form and frequency of publication. Known creditors must receive individual notice by mail."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 45
    dependencies:
      - "de_file_register_of_wills"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

deadlines:
  - key: "de_creditor_claim_period"
    title: "Delaware Creditor Claim Period (8 Months)"
    description: "Creditors have 8 months from the granting of letters to file claims"
    relative_to: "matter_created"
    offset_months: 8
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "de_inventory_deadline"
    title: "Delaware Inventory Deadline (3 Months)"
    description: "Inventory must be filed within 3 months of appointment"
    relative_to: "matter_created"
    offset_days: 90
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
