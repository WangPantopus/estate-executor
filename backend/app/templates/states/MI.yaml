# Michigan — State-specific tasks and deadline rules

tasks:
  - key: "mi_file_probate_court"
    title: "File Petition with Michigan Probate Court"
    description: "File petition for probate with the Probate Court in the appropriate county"
    instructions: "Michigan has dedicated Probate Courts in each county. File the petition in the county where the decedent was domiciled. Michigan follows EPIC (Estates and Protected Individuals Code), which is based on the UPC. Informal and formal proceedings are both available."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "mi_small_estate_affidavit"
    title: "Consider Small Estate Affidavit (Under $24,000)"
    description: "Determine if estate qualifies for transfer by affidavit"
    instructions: "Michigan allows transfer by affidavit for estates with personal property valued at $24,000 or less (adjusted periodically), after 28 days from death. The affidavit is presented to entities holding the decedent's property."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "mi_publish_notice_creditors"
    title: "Publish Notice to Creditors (Michigan)"
    description: "Publish notice in a newspaper in the county"
    instructions: "Michigan requires the personal representative to publish notice to creditors in a newspaper of general circulation in the county. Known creditors must receive individual notice. Michigan has a relatively short creditor claim period."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "mi_file_probate_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

deadlines:
  - key: "mi_creditor_claim_period"
    title: "Michigan Creditor Claim Period (4 Months)"
    description: "Creditors have 4 months from publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 4
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "mi_inventory_deadline"
    title: "Michigan Inventory Deadline (91 Days)"
    description: "Inventory must be filed within 91 days of appointment"
    relative_to: "matter_created"
    offset_days: 91
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
