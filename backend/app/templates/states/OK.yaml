# Oklahoma — State-specific tasks and deadline rules

tasks:
  - key: "ok_file_probate_district_court"
    title: "File Petition with Oklahoma District Court"
    description: "File petition for probate with the District Court in the appropriate county"
    instructions: "File the petition with the District Court in the county where the decedent was domiciled. Oklahoma follows its own probate code. Summary administration is available for smaller estates. Full administration requires court supervision."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "ok_small_estate_affidavit"
    title: "Consider Small Estate Affidavit (Under $50,000)"
    description: "Determine if estate qualifies for simplified transfer"
    instructions: "Oklahoma allows a summary administration procedure for estates valued at $200,000 or less, and an affidavit procedure for personal property under $50,000. Summary administration is faster than full probate."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "ok_publish_notice_creditors"
    title: "Publish Notice to Creditors (Oklahoma)"
    description: "Publish notice in a newspaper in the county once a week for two consecutive weeks"
    instructions: "Oklahoma requires notice to creditors by publication once a week for two consecutive weeks in a newspaper published in the county. Known creditors must receive individual notice by mail."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "ok_file_probate_district_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

deadlines:
  - key: "ok_creditor_claim_period"
    title: "Oklahoma Creditor Claim Period (2 Months)"
    description: "Creditors have 2 months from first publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 2
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "ok_inventory_deadline"
    title: "Oklahoma Inventory Deadline (2 Months)"
    description: "Inventory must be filed within 2 months of appointment"
    relative_to: "matter_created"
    offset_days: 60
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
