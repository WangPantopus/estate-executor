# Colorado — State-specific tasks and deadline rules

tasks:
  - key: "co_file_probate_district_court"
    title: "File Petition with Colorado District Court"
    description: "File petition for probate with the District Court in the appropriate county"
    instructions: "Colorado follows the Uniform Probate Code. File the petition with the District Court (Probate Division) in the county where the decedent was domiciled. Colorado allows informal probate (without hearing) and formal probate. Informal probate is handled by the court registrar."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "co_small_estate_affidavit"
    title: "Consider Small Estate Affidavit (Under $74,000)"
    description: "Determine if estate qualifies for transfer by affidavit"
    instructions: "Colorado allows transfer by affidavit for estates with gross value of $74,000 or less (adjusted periodically). The affidavit can be used 10 days after death. This avoids full probate administration."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "co_publish_notice_creditors"
    title: "Publish Notice to Creditors (Colorado)"
    description: "Publish notice in a newspaper once a week for three consecutive weeks"
    instructions: "Colorado requires the personal representative to publish notice to creditors in a newspaper of general circulation in the county once a week for three consecutive weeks. Known creditors must receive individual mailed notice."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "co_file_probate_district_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "co_file_estate_tax"
    title: "File Colorado Estate Tax Return (If Applicable)"
    description: "Colorado does not currently impose a separate estate tax"
    instructions: "Colorado does not impose a separate state estate tax. However, if a federal estate tax return (Form 706) is required, retain a copy for records. Colorado does impose an inheritance-related income tax on certain distributions — consult a CPA."
    phase: "tax"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule: null
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "trust_administration", "mixed_probate_trust"]
      flags:
        - "high_value_estate"
    subtasks: []

deadlines:
  - key: "co_creditor_claim_period"
    title: "Colorado Creditor Claim Period (4 Months)"
    description: "Creditors have 4 months from first publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 4
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "co_inventory_deadline"
    title: "Colorado Inventory Deadline (90 Days)"
    description: "Inventory must be filed within 90 days of appointment"
    relative_to: "matter_created"
    offset_days: 90
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
