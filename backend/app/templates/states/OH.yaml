# Ohio — State-specific tasks and deadline rules

tasks:
  - key: "oh_file_probate_court"
    title: "File with Ohio Probate Court"
    description: "File petition for probate with the Probate Court in the appropriate county"
    instructions: "Ohio has dedicated Probate Courts in each county. File the petition in the county where the decedent was domiciled. Ohio requires the will to be filed within a reasonable time. The court will appoint the executor or administrator."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "oh_release_from_administration"
    title: "Consider Release from Administration (Under $35,000)"
    description: "Determine if estate qualifies for release from administration"
    instructions: "Ohio allows release from administration for estates valued at $35,000 or less. The surviving spouse or next of kin can petition the Probate Court for release. Alternatively, a summary release is available for estates under $5,000."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "oh_publish_notice_creditors"
    title: "Publish Notice to Creditors (Ohio)"
    description: "Publish notice in a newspaper in the county once a week for three weeks"
    instructions: "Ohio requires the executor to publish notice to creditors in a newspaper of general circulation in the county once a week for three consecutive weeks. Known creditors must receive individual notice."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "oh_file_probate_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "oh_file_estate_tax"
    title: "File Ohio Estate Tax Return (If Applicable)"
    description: "Ohio repealed its estate tax effective January 1, 2013"
    instructions: "Ohio repealed its state estate tax effective January 1, 2013. No Ohio estate tax return is required. If the estate is subject to federal estate tax, ensure the federal Form 706 is filed."
    phase: "tax"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule: null
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "trust_administration", "mixed_probate_trust"]
      flags:
        - "high_value_estate"
    subtasks: []

deadlines:
  - key: "oh_creditor_claim_period"
    title: "Ohio Creditor Claim Period (6 Months)"
    description: "Creditors have 6 months from date of death to present claims"
    relative_to: "date_of_death"
    offset_months: 6
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "oh_inventory_deadline"
    title: "Ohio Inventory Deadline (90 Days)"
    description: "Inventory must be filed within 90 days of appointment"
    relative_to: "matter_created"
    offset_days: 90
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
