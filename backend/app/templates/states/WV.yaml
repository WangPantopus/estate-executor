# West Virginia — State-specific tasks and deadline rules

tasks:
  - key: "wv_file_county_commission"
    title: "File with West Virginia County Commission"
    description: "File petition for probate with the County Commission in the appropriate county"
    instructions: "West Virginia handles probate through the County Commission (sitting as the Probate Court). File the petition in the county where the decedent was domiciled. The County Clerk administers the probate process."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "wv_small_estate"
    title: "Consider Small Estate (Under $50,000)"
    description: "Determine if estate qualifies for simplified process"
    instructions: "West Virginia allows a simplified process for estates valued at $50,000 or less. A small estate affidavit or summary settlement can be used to avoid full administration."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "wv_publish_notice_creditors"
    title: "Publish Notice to Creditors (West Virginia)"
    description: "Publish notice in a newspaper in the county"
    instructions: "West Virginia requires notice to creditors by publication. The County Commission will direct publication in an appropriate newspaper. Known creditors must receive individual notice."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "wv_file_county_commission"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

deadlines:
  - key: "wv_creditor_claim_period"
    title: "West Virginia Creditor Claim Period (3 Months)"
    description: "Creditors have 3 months from first publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 3
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "wv_appraisal_deadline"
    title: "West Virginia Appraisal Deadline (90 Days)"
    description: "Appraisal must be completed within 90 days of appointment"
    relative_to: "matter_created"
    offset_days: 90
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
