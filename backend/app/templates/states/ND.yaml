# North Dakota — State-specific tasks and deadline rules

tasks:
  - key: "nd_file_probate_district_court"
    title: "File Petition with North Dakota District Court"
    description: "File petition for probate with the District Court in the appropriate county"
    instructions: "North Dakota follows the Uniform Probate Code. File the petition with the District Court in the county where the decedent was domiciled. Informal (registrar) and formal (judicial) probate are available."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "nd_small_estate_affidavit"
    title: "Consider Small Estate Affidavit (Under $50,000)"
    description: "Determine if estate qualifies for transfer by affidavit"
    instructions: "North Dakota allows transfer by affidavit for estates with personal property valued at $50,000 or less, after 30 days from death. No court filing is required."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "nd_publish_notice_creditors"
    title: "Publish Notice to Creditors (North Dakota)"
    description: "Publish notice in a newspaper once a week for three consecutive weeks"
    instructions: "North Dakota requires notice to creditors by publication once a week for three consecutive weeks in the official newspaper of the county. Known creditors must receive individual notice."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "nd_file_probate_district_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

deadlines:
  - key: "nd_creditor_claim_period"
    title: "North Dakota Creditor Claim Period (3 Months)"
    description: "Creditors have 3 months from first publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 3
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "nd_inventory_deadline"
    title: "North Dakota Inventory Deadline (90 Days)"
    description: "Inventory must be filed within 90 days of appointment"
    relative_to: "matter_created"
    offset_days: 90
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
