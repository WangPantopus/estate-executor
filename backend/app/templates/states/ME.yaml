# Maine — State-specific tasks and deadline rules

tasks:
  - key: "me_file_probate_court"
    title: "File Petition with Maine Probate Court"
    description: "File petition for probate with the Probate Court in the appropriate county"
    instructions: "Maine follows the Uniform Probate Code. File the petition with the Probate Court in the county where the decedent was domiciled. Maine allows informal (registrar) and formal (judicial) probate. Informal probate is appropriate for uncontested estates."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "me_small_estate_affidavit"
    title: "Consider Small Estate Affidavit (Under $40,000)"
    description: "Determine if estate qualifies for transfer by affidavit"
    instructions: "Maine allows transfer by affidavit for estates with personal property valued at $40,000 or less, after 30 days from death. This avoids full probate administration."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "me_publish_notice_creditors"
    title: "Publish Notice to Creditors (Maine)"
    description: "Publish notice as required by the Probate Court"
    instructions: "Maine requires notice to creditors by publication. The Probate Court will direct the form of publication. Known creditors must receive individual notice."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "me_file_probate_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "me_file_estate_tax"
    title: "File Maine Estate Tax Return"
    description: "File Maine estate tax return if estate exceeds state threshold"
    instructions: "Maine imposes an estate tax on estates exceeding $6.8 million (2024 threshold). File the Maine estate tax return within 9 months of death. Maine's estate tax rates range from 8% to 12%."
    phase: "tax"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "date_of_death"
      offset_months: 9
    dependencies:
      - "inventory_bank_investment_accounts"
      - "inventory_real_estate"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "trust_administration", "mixed_probate_trust"]
    subtasks: []

deadlines:
  - key: "me_creditor_claim_period"
    title: "Maine Creditor Claim Period (4 Months)"
    description: "Creditors have 4 months from first publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 4
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "me_estate_tax_deadline"
    title: "Maine Estate Tax Return Deadline"
    description: "Maine estate tax return due within 9 months of death"
    relative_to: "date_of_death"
    offset_months: 9
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "trust_administration", "mixed_probate_trust"]

  - key: "me_inventory_deadline"
    title: "Maine Inventory Deadline (3 Months)"
    description: "Inventory must be filed within 3 months of appointment"
    relative_to: "matter_created"
    offset_days: 90
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
