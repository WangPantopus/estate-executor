# Wyoming — State-specific tasks and deadline rules

tasks:
  - key: "wy_file_probate_district_court"
    title: "File Petition with Wyoming District Court"
    description: "File petition for probate with the District Court in the appropriate county"
    instructions: "Wyoming follows its own probate statutes (not UPC). File the petition with the District Court in the county where the decedent was domiciled. Wyoming generally requires court supervision of the estate."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "wy_small_estate_affidavit"
    title: "Consider Small Estate Affidavit (Under $200,000)"
    description: "Determine if estate qualifies for transfer by affidavit"
    instructions: "Wyoming allows transfer by affidavit for estates with personal property valued at $200,000 or less, after 30 days from death. Wyoming has one of the highest small estate thresholds in the US."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "wy_publish_notice_creditors"
    title: "Publish Notice to Creditors (Wyoming)"
    description: "Publish notice in a newspaper once a week for three consecutive weeks"
    instructions: "Wyoming requires notice to creditors by publication once a week for three consecutive weeks in a newspaper of general circulation in the county. Known creditors must receive individual notice."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "wy_file_probate_district_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

deadlines:
  - key: "wy_creditor_claim_period"
    title: "Wyoming Creditor Claim Period (3 Months)"
    description: "Creditors have 3 months from first publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 3
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "wy_inventory_deadline"
    title: "Wyoming Inventory Deadline (90 Days)"
    description: "Inventory must be filed within 90 days of appointment"
    relative_to: "matter_created"
    offset_days: 90
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
