# Arkansas — State-specific tasks and deadline rules

tasks:
  - key: "ar_file_probate_circuit_court"
    title: "File Petition with Arkansas Circuit Court (Probate Division)"
    description: "File petition for probate with the Circuit Court's Probate Division"
    instructions: "File the petition for probate with the Circuit Court, Probate Division, in the county where the decedent was domiciled. Arkansas allows independent administration if the will authorizes it or all heirs consent, which avoids ongoing court supervision."
    phase: "probate_filing"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "obtain_death_certificates"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "ar_small_estate_affidavit"
    title: "Consider Small Estate Affidavit (Under $100,000)"
    description: "Determine if estate qualifies for simplified transfer"
    instructions: "Arkansas allows an affidavit procedure for estates with personal property valued at $100,000 or less, after 45 days from death. This avoids full probate. File an affidavit with entities holding the decedent's property."
    phase: "immediate"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 14
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate"]
    subtasks: []

  - key: "ar_publish_notice_creditors"
    title: "Publish Notice to Creditors (Arkansas)"
    description: "Publish notice in a newspaper once a week for two consecutive weeks"
    instructions: "Arkansas requires publication of notice to creditors once a week for two consecutive weeks in a newspaper published in the county. Known creditors must receive individual notice by mail."
    phase: "notification"
    priority: "critical"
    default_assignee_role: "professional"
    requires_document: true
    due_date_rule:
      relative_to: "matter_created"
      offset_days: 30
    dependencies:
      - "ar_file_probate_circuit_court"
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
    subtasks: []

  - key: "ar_file_estate_tax"
    title: "File Arkansas Estate Tax Return (If Applicable)"
    description: "Arkansas repealed its estate tax but confirm no filing is needed"
    instructions: "Arkansas repealed its state estate tax for decedents dying after January 1, 2005. No state estate tax return is required. However, if a federal Form 706 is filed, retain a copy for records."
    phase: "tax"
    priority: "normal"
    default_assignee_role: "professional"
    requires_document: false
    due_date_rule: null
    dependencies: []
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "trust_administration", "mixed_probate_trust"]
      flags:
        - "high_value_estate"
    subtasks: []

deadlines:
  - key: "ar_creditor_claim_period"
    title: "Arkansas Creditor Claim Period (6 Months)"
    description: "Creditors have 6 months from first publication of notice to file claims"
    relative_to: "matter_created"
    offset_months: 6
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]

  - key: "ar_inventory_deadline"
    title: "Arkansas Inventory Deadline (2 Months)"
    description: "Inventory must be filed within 2 months of appointment"
    relative_to: "matter_created"
    offset_days: 60
    conditions:
      estate_types: ["testate_probate", "intestate_probate", "mixed_probate_trust"]
